<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Book Softball Pitching Lessons | Vanessa Strong Softball</title>
    <meta
      name="description"
      content="Request private softball pitching lessons with Vanessa Strong in Brentwood and the East Bay. Share your athlete's goals and availability."
    />
    <link rel="canonical" href="https://dstrong23.github.io/smbfastpitch/signup.html" />
    <style>
      :root {
        --bg: #f4f4f4;
        --paper: #ffffff;
        --ink: #111111;
        --muted: #4c5d70;
        --accent: #ef7b68;
        --accent-dark: #d96452;
        --line: #d8d8d8;
        --max: 860px;
      }

      main {
        padding: 1.7rem 0;
      }

      .card {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 1.2rem;
      }

      h1 {
        margin: 0.55rem 0 0.45rem;
        font-size: clamp(1.65rem, 4vw, 2.5rem);
        text-transform: uppercase;
      }

      .accent {
        color: var(--accent-dark);
      }

      .muted {
        color: var(--muted);
      }

      .form-note {
        margin: 0.75rem 0 0;
        font-size: 0.95rem;
      }

      .google-form-wrap {
        margin-top: 1rem;
        width: 100%;
        border-radius: 10px;
        overflow: hidden;
      }

      .google-form {
        display: block;
        width: 100%;
        height: 1500px;
        border: 0;
      }

      @media (max-width: 640px) {
        .google-form {
          height: 1700px;
        }
      }
    </style>
    <link rel="stylesheet" href="styles/shared.css" />
  </head>
  <body>
    <div data-include="components/navigation.html"></div>

    <main>
      <div class="container card">
        <h1>Request a <span class="accent">Session</span></h1>
        <p class="muted">Tell us about your athlete and goals. We will follow up with availability and next steps for private softball pitching lessons in Brentwood and the East Bay.</p>
        <p class="muted form-note">Submit your request here and we will follow up by email.</p>

        <div class="google-form-wrap">
          <iframe
            class="google-form"
            src="https://docs.google.com/forms/d/1Vk4aUP8Fd9EoJ0GfbdXJZfbzCnGcDAokx8IoLyIXhNI/viewform?embedded=true"
            title="Vanessa Strong Softball lesson request form"
          >
            Loading...
          </iframe>
        </div>
      </div>
    </main>

    <div data-include="components/footer.html"></div>

    <script src="scripts/includes.js"></script>
  </body>
</html>
