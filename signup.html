<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Book Softball Pitching Lessons | Vanessa Strong Softball</title>
    <meta
      name="description"
      content="Request private softball pitching lessons with Vanessa Strong in Brentwood and the East Bay. Share your athlete's goals and availability."
    />
    <link rel="canonical" href="https://dstrong23.github.io/smbfastpitch/signup.html" />
    <style>
      :root {
        --bg: #f4f4f4;
        --paper: #ffffff;
        --ink: #111111;
        --muted: #4c5d70;
        --accent: #ef7b68;
        --accent-dark: #d96452;
        --line: #d8d8d8;
        --max: 860px;
      }

      main {
        padding: 1.7rem 0;
      }

      .card {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 1.2rem;
      }

      h1 {
        margin: 0.55rem 0 0.45rem;
        font-size: clamp(1.65rem, 4vw, 2.5rem);
        text-transform: uppercase;
      }

      .accent {
        color: var(--accent-dark);
      }

      .muted {
        color: var(--muted);
      }

      form {
        display: grid;
        gap: 0.85rem;
        margin-top: 1rem;
      }

      .field {
        display: grid;
        gap: 0.3rem;
      }

      .two {
        display: grid;
        grid-template-columns: 1fr;
        gap: 0.85rem;
      }

      label {
        font-weight: 700;
      }

      input,
      select,
      textarea {
        width: 100%;
        font: inherit;
        padding: 0.68rem 0.72rem;
        border: 1px solid #bfc6cc;
        border-radius: 10px;
        background: #ffffff;
      }

      input:focus,
      select:focus,
      textarea:focus {
        outline: 2px solid #ffb3a6;
        outline-offset: 1px;
        border-color: #e58c7b;
      }

      .btn {
        margin-top: 0.2rem;
        border: 0;
        background: #111111;
        color: #ffffff;
        padding: 0.82rem 1rem;
        border-radius: 10px;
        font-weight: 800;
        text-transform: uppercase;
        cursor: pointer;
      }

      .btn:hover,
      .btn:focus-visible {
        background: #2d2d2d;
      }

      @media (min-width: 760px) {
        .two {
          grid-template-columns: 1fr 1fr;
        }
      }
    </style>
    <link rel="stylesheet" href="styles/shared.css" />
  </head>
  <body>
    <div data-include="components/navigation.html"></div>

    <main>
      <div class="container card">
        <h1>Request a <span class="accent">Session</span></h1>
        <p class="muted">Tell us about your athlete and goals. We will follow up with availability and next steps for private softball pitching lessons in Brentwood and the East Bay.</p>

        <form action="#" method="post">
          <div class="two">
            <div class="field">
              <label for="first-name">First Name</label>
              <input id="first-name" name="first_name" type="text" autocomplete="given-name" required />
            </div>
            <div class="field">
              <label for="last-name">Last Name</label>
              <input id="last-name" name="last_name" type="text" autocomplete="family-name" required />
            </div>
          </div>

          <div class="two">
            <div class="field">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" autocomplete="email" required />
            </div>
            <div class="field">
              <label for="phone">Phone</label>
              <input id="phone" name="phone" type="tel" autocomplete="tel" />
            </div>
          </div>

          <div class="field">
            <label for="interest">Primary Focus</label>
            <select id="interest" name="interest" required>
              <option value="" selected disabled>Select one</option>
              <option value="mechanics">Mechanics</option>
              <option value="velocity">Velocity and Control</option>
              <option value="mental-approach">Mental Approach</option>
              <option value="private-lessons">Private Lessons</option>
              <option value="general">General Development</option>
            </select>
          </div>

          <div class="field">
            <label for="message">Athlete Goals</label>
            <textarea id="message" name="message" rows="5" placeholder="Share age, experience level, goals, and preferred availability."></textarea>
          </div>

          <button type="submit" class="btn">Submit Request</button>
        </form>
      </div>
    </main>

    <div data-include="components/footer.html"></div>

    <script src="scripts/includes.js"></script>
  </body>
</html>
