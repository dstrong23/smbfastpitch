<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SMB Fastpitch | Sign Up</title>
    <meta name="description" content="Book softball pitching lessons and receive SMB Fastpitch updates." />
    <style>
      :root { --bg:#f4f4f4; --paper:#fff; --ink:#111; --accent:#ef7b68; --line:#d8d8d8; --max:860px; }
      *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,Segoe UI,Arial,sans-serif}
      .container{width:min(100% - 2rem,var(--max));margin-inline:auto} a{text-decoration:none;color:inherit}
      header{position:sticky;top:0;background:#fffffff0;border-bottom:1px solid var(--line)} .head{min-height:72px;display:flex;justify-content:space-between;align-items:center;gap:1rem}
      .brand{font-weight:900;text-transform:uppercase}.nav{display:flex;gap:.35rem;flex-wrap:wrap}.nav a{padding:.52rem .75rem;border-radius:10px;font-weight:600}.nav a:hover,.nav a:focus-visible{background:#ffe8e3;outline:none}
      main{padding:1.7rem 0}.card{background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:1.2rem}
      .tag{display:inline-block;background:#fee7e2;padding:.3rem .6rem;border-radius:999px;font-weight:800;font-size:.8rem;text-transform:uppercase}
      h1{margin:.55rem 0 .45rem;font-size:clamp(1.65rem,4vw,2.5rem);text-transform:uppercase}.accent{color:#d96452}
      form{display:grid;gap:.85rem;margin-top:1rem}.field{display:grid;gap:.3rem}.two{display:grid;grid-template-columns:1fr;gap:.85rem}
      label{font-weight:700} input,select,textarea{font:inherit;padding:.68rem .72rem;border:1px solid #bfc6cc;border-radius:10px;background:#fff}
      input:focus,select:focus,textarea:focus{outline:2px solid #ffb3a6;outline-offset:1px;border-color:#e58c7b}
      .btn{margin-top:.2rem;border:0;background:#111;color:#fff;padding:.82rem 1rem;border-radius:10px;font-weight:800;text-transform:uppercase;cursor:pointer}
      .btn:hover,.btn:focus-visible{background:#2d2d2d}
      footer{border-top:1px solid var(--line);margin-top:2rem}.foot{padding:1rem 0 1.5rem;color:#555}
      @media (min-width:760px){.two{grid-template-columns:1fr 1fr}}
    </style>
  </head>
  <body>
    <header>
      <div class="container head">
        <a href="index.html" class="brand">SMB Fastpitch</a>
        <nav class="nav" aria-label="Primary navigation">
          <a href="index.html">Home</a>
          <a href="bio.html">Bio</a>
          <a href="signup.html" aria-current="page">Sign Up</a>
        </nav>
      </div>
    </header>

    <main>
      <div class="container card">
        <span class="tag">Now Booking Lessons</span>
        <h1>Request a <span class="accent">Session</span></h1>
        <p>Tell us about your athlete and goals. We’ll follow up with availability and next steps.</p>

        <form action="#" method="post">
          <div class="two">
            <div class="field">
              <label for="first-name">First Name</label>
              <input id="first-name" name="first_name" type="text" autocomplete="given-name" required />
            </div>
            <div class="field">
              <label for="last-name">Last Name</label>
              <input id="last-name" name="last_name" type="text" autocomplete="family-name" required />
            </div>
          </div>

          <div class="two">
            <div class="field">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" autocomplete="email" required />
            </div>
            <div class="field">
              <label for="phone">Phone</label>
              <input id="phone" name="phone" type="tel" autocomplete="tel" />
            </div>
          </div>

          <div class="field">
            <label for="interest">Primary Focus</label>
            <select id="interest" name="interest" required>
              <option value="" selected disabled>Select one</option>
              <option value="mechanics">Mechanics</option>
              <option value="velocity">Velocity + Control</option>
              <option value="mental-approach">Mental Approach</option>
              <option value="general">General Development</option>
            </select>
          </div>

          <div class="field">
            <label for="message">Athlete Goals</label>
            <textarea id="message" name="message" rows="5" placeholder="Share age, experience level, and goals."></textarea>
          </div>

          <button type="submit" class="btn">Submit Request</button>
        </form>
      </div>
    </main>

    <footer>
      <div class="container foot">© <span id="year">2026</span> SMB Fastpitch</div>
    </footer>
    <script>document.getElementById("year").textContent = new Date().getFullYear();</script>
  </body>
</html>
