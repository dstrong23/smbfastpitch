<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SMB Fastpitch | Sign Up</title>
    <meta name="description" content="Sign up for SMB Fastpitch updates, tryouts, and clinic information." />
    <style>
      :root{--bg:#f7f9fc;--surface:#fff;--text:#16202a;--muted:#4c5d70;--brand:#005bbb;--brand2:#003f80;--border:#d9e2ec;--radius:14px;--max:860px}
      *{box-sizing:border-box} body{margin:0;font-family:Inter,"Segoe UI",Roboto,Arial,sans-serif;color:var(--text);background:var(--bg);line-height:1.5}
      .container{width:min(100% - 2rem,var(--max));margin-inline:auto} a{text-decoration:none;color:inherit}
      header{position:sticky;top:0;background:#ffffffef;border-bottom:1px solid var(--border);backdrop-filter:blur(8px)}
      .head{min-height:70px;display:flex;justify-content:space-between;align-items:center;gap:1rem}.nav{display:flex;gap:.4rem;flex-wrap:wrap}
      .nav a{padding:.5rem .75rem;border-radius:10px;color:var(--muted)} .nav a:hover,.nav a:focus-visible{background:#eaf2ff;color:var(--brand2);outline:none}
      main{padding:2.2rem 0}.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem}
      h1{font-size:clamp(1.7rem,3vw,2.3rem);margin-top:0}.muted{color:var(--muted)}
      form{display:grid;gap:.9rem;margin-top:1rem} .field{display:grid;gap:.35rem}
      label{font-weight:600} input,select,textarea{width:100%;padding:.68rem .75rem;border:1px solid #bcc9d8;border-radius:10px;font:inherit}
      input:focus,select:focus,textarea:focus{outline:2px solid #9bc2ff;outline-offset:1px;border-color:#7ca8ee}
      button{border:0;background:var(--brand);color:#fff;padding:.78rem 1rem;border-radius:10px;font-weight:700;cursor:pointer}
      button:hover,button:focus-visible{background:var(--brand2)}
      footer{border-top:1px solid var(--border);padding:1.5rem 0;color:var(--muted)}
      @media (min-width:760px){.two{display:grid;grid-template-columns:1fr 1fr;gap:.9rem}}
    </style>
  </head>
  <body>
    <header>
      <div class="container head">
        <a href="index.html"><strong>SMB Fastpitch</strong></a>
        <nav class="nav" aria-label="Primary navigation">
          <a href="index.html">Home</a>
          <a href="bio.html">Bio</a>
          <a href="signup.html" aria-current="page">Sign Up</a>
        </nav>
      </div>
    </header>

    <main>
      <div class="container card">
        <h1>Sign Up for Updates</h1>
        <p class="muted">Complete this form to receive announcements for tryouts, clinics, and team events.</p>

        <form action="#" method="post">
          <div class="two">
            <div class="field">
              <label for="first-name">First Name</label>
              <input id="first-name" name="first_name" type="text" autocomplete="given-name" required />
            </div>
            <div class="field">
              <label for="last-name">Last Name</label>
              <input id="last-name" name="last_name" type="text" autocomplete="family-name" required />
            </div>
          </div>

          <div class="two">
            <div class="field">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" autocomplete="email" required />
            </div>
            <div class="field">
              <label for="phone">Phone</label>
              <input id="phone" name="phone" type="tel" autocomplete="tel" />
            </div>
          </div>

          <div class="field">
            <label for="interest">Primary Interest</label>
            <select id="interest" name="interest" required>
              <option value="" selected disabled>Select one</option>
              <option value="tryouts">Tryouts</option>
              <option value="clinics">Clinics</option>
              <option value="private-lessons">Private Lessons</option>
              <option value="general-updates">General Updates</option>
            </select>
          </div>

          <div class="field">
            <label for="message">Message (optional)</label>
            <textarea id="message" name="message" rows="5" placeholder="Anything you'd like us to know?"></textarea>
          </div>

          <button type="submit">Submit</button>
        </form>
      </div>
    </main>

    <footer>
      <div class="container">© <span id="year">2026</span> SMB Fastpitch</div>
    </footer>
    <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
  </body>
</html>
